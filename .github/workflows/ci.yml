name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - run: cd backend && pytest

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      # Versiones fijadas para que el formato coincida con el local/requirements
      # (black sin pin trae una version nueva con reglas distintas -> falsos fallos).
      - run: pip install black==26.5.1 flake8==6.1.0 mypy==1.7.1
      - run: cd backend && black --check . && flake8 .
      - name: SQLi guard
        run: cd backend && python scripts/check_no_sqli.py

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci && npm run lint && npm run build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt --desc --strict || echo "vulns encontradas"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci && (npm audit --audit-level=high || echo "vulns encontradas")
